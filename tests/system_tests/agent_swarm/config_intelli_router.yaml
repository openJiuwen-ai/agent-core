# Agent Team E2E — IntelliRouter reliable-routing configuration
#
# Demonstrates the ``intelli_router`` allocation strategy: one leader plus
# three teammates, every member backed by the same client-side reliable
# router. Reliability comes from the client (retry / failover across
# deployments), not from spreading members across endpoints the way
# ``round_robin`` does.
#
# Deployment layout mirrors tests/system_tests/config_llm_local*.yaml:
#   IR_DEEPSEEK_BASE / IR_DEEPSEEK_KEY_1   — config_llm_local.yaml
#   IR_DEEPSEEK_KEY_2                      — config_llm_local_2.yaml
#   IR_GATEWAY_BASE  / IR_GATEWAY_KEY      — config_llm_local_3.yaml
#
# ``deepseek-v4-flash`` is backed by two independent keys on the same
# endpoint, so a key-level failure (rate limit / auth) fails over to the
# sibling deployment without the team noticing.
#
# NOTE: ``api_base`` here is the provider ROOT, without the ``/v1``
# suffix — IntelliRouter's adapters append their own path. The E2E script
# strips ``/v1`` from the sibling configs for this reason. See
# IntelliRouterDeployment.api_base.

team_name: intelli_router_team
# Temporary: the run tears the team down when the leader completes, so the
# script exits on its own and each run starts from a clean roster. A
# persistent team would instead pause and wait for more input, and would
# keep each member's (model_name, model_index) row across runs — which goes
# stale the moment model_names below changes.
lifecycle: temporary
teammate_mode: build_mode
spawn_mode: inprocess
# Roster is fully declared below; no dynamic spawn_member needed.
team_mode: predefined

leader:
  member_name: team_leader
  display_name: TeamLeader
  persona: "资深技术项目经理，负责向队员派活并汇总回复"
  # model_name intentionally unset — the allocator falls back to the
  # router's first declared name ("*"), i.e. unified routing across every
  # deployment, which is the most available option in the pool.

# ---------------------------------------------------------------------------
# IntelliRouter — one client-side router shared by every member.
#
# Expands at build() into a flat model_pool: one entry per model_names
# element, each carrying the full deployment list. Strategy is forced to
# "intelli_router".
# ---------------------------------------------------------------------------
model_intelli_router:
  strategy: simple-shuffle
  num_retries: 3
  timeout: 60.0
  verify_ssl: false

  # Logical names offered to members for allocation. First entry is the
  # team default ("*" = route across every deployment).
  model_names:
    - "*"
    - deepseek-v4-flash
    - Qwen3.7-Plus
    - GLM-5.2

  deployments:
    # --- DeepSeek, two keys behind one model name (key-level failover) ---
    - id: deepseek-flash-key1
      model_name: deepseek-v4-flash
      api_key: "${IR_DEEPSEEK_KEY_1}"
      api_base: "${IR_DEEPSEEK_BASE}"
      provider: deepseek
      rpm: 60
      timeout: 60.0
      tags: [primary, deepseek]

    - id: deepseek-flash-key2
      model_name: deepseek-v4-flash
      api_key: "${IR_DEEPSEEK_KEY_2}"
      api_base: "${IR_DEEPSEEK_BASE}"
      provider: deepseek
      rpm: 60
      timeout: 60.0
      tags: [backup, deepseek]

    # --- OpenAI-compatible gateway serving several models ---
    - id: gateway-qwen-plus
      model_name: Qwen3.7-Plus
      api_key: "${IR_GATEWAY_KEY}"
      api_base: "${IR_GATEWAY_BASE}"
      provider: openai
      rpm: 60
      timeout: 60.0
      tags: [gateway, qwen]

    - id: gateway-glm-52
      model_name: GLM-5.2
      api_key: "${IR_GATEWAY_KEY}"
      api_base: "${IR_GATEWAY_BASE}"
      provider: openai
      rpm: 60
      timeout: 60.0
      tags: [gateway, glm]

    - id: gateway-glm-51
      model_name: GLM-5.1
      api_key: "${IR_GATEWAY_KEY}"
      api_base: "${IR_GATEWAY_BASE}"
      provider: openai
      rpm: 60
      timeout: 60.0
      tags: [gateway, glm]

# ---------------------------------------------------------------------------
# Three teammates, each pinned to a different logical model name.
#
# A pinned name routes only within that model's deployments; the leader's
# unset name routes across all of them.
# ---------------------------------------------------------------------------
predefined_members:
  - member_name: alice
    display_name: Alice
    role_type: teammate
    desc: "队员 Alice"
    model_name: deepseek-v4-flash

  - member_name: bob
    display_name: Bob
    role_type: teammate
    desc: "队员 Bob"
    model_name: Qwen3.7-Plus

  - member_name: carol
    display_name: Carol
    role_type: teammate
    desc: "队员 Carol"
    model_name: GLM-5.2

# ---------------------------------------------------------------------------
# Shared agent spec anchors
# ---------------------------------------------------------------------------
x-shared-agent-spec: &shared_agent_spec
  max_iterations: 30
  completion_timeout: 300.0
  language: cn
  enable_task_planning: false
  enable_async_subagent: false
  restrict_to_sandbox: false

# model field intentionally omitted — the pool allocator fills it in.
agents:
  leader:
    <<: *shared_agent_spec

  teammate:
    <<: *shared_agent_spec

transport:
  type: inprocess

storage:
  type: sqlite

# ---------------------------------------------------------------------------
# Runtime (consumed by agent_team_intelli_router_e2e.py, not TeamAgentSpec)
# ---------------------------------------------------------------------------
runtime:
  session_id: intelli_router_session
  # Each teammate is pinned to a different model, so a reply from all three
  # means all three routes actually resolved and served a request.
  #
  # Deliberately NOT "report which model you are using": an LLM cannot
  # introspect the deployment serving it and will confabulate an answer.
  # Which model each member draws is asserted offline by the E2E script;
  # this round only proves the routes work end to end.
  initial_query: >-
    请给 alice、bob、carol 三名队员各单独发一条消息（禁止广播、禁止建任务），
    让每人用一句话回答：中国的首都是哪座城市？
    收齐三人回复后，把三条回复汇总成一份简短清单并结束。
