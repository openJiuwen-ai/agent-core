# Agent Team E2E configuration — 5-person parallel development with worktree isolation
#
# Each teammate gets an isolated git worktree so file changes never conflict.
# The leader coordinates from the main repo; teammates work in:
#   my-project/.agent_teams/worktrees/<slug>/
#
# Sensitive values should be overridden via environment variables:
#   API_BASE, LEADER_API_KEY, TEAMMATE_API_KEY, MODEL_NAME

team_name: my_project_team10
lifecycle: persistent
teammate_mode: build_mode
spawn_mode: inprocess

leader:
  member_name: team_leader
  display_name: TeamLeader
  persona: "资深技术项目经理，擅长拆解复杂工程任务并协调多人并行开发"

# ---------------------------------------------------------------------------
# Worktree isolation — each teammate gets its own working copy
# ---------------------------------------------------------------------------
worktree:
  enabled: true
  # symlink heavy dirs instead of copying (saves disk + time)
  symlink_directories:
    - .venv
    - node_modules
  auto_cleanup_on_shutdown: true
  lifecycle_policy: auto          # temporary team → ephemeral worktrees

# Shared team workspace: ~/.openjiuwen/.agent_teams/{team_name}/team-workspace/
# Omit root_path to use the default. Members access it via .team/ symlink.
workspace:
  enabled: true
  artifact_dirs:
    - artifacts/code
    - artifacts/docs
    - artifacts/reports
  version_control: true
  conflict_strategy: lock

# ---------------------------------------------------------------------------
# Shared capability anchors
# ---------------------------------------------------------------------------

x-model-template: &model_template
  model_client_config:
    client_provider: OpenAI
    api_base: "${API_BASE}"
    api_key: "${LEADER_API_KEY}"
    timeout: 120
    rate_limit: 10.0              # max 1 request/sec per endpoint
    verify_ssl: false
  model_request_config:
    model: "${MODEL_NAME}"
    temperature: 0.2
    top_p: 0.9

x-shared-rails: &shared_rails
  - type: filesystem
  - type: skill_use
    params:
      skill_mode: all
