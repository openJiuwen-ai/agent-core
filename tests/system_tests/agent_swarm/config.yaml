      - type: filesystem

x-shared-agent-spec: &shared_agent_spec
  workspace:
#    root_path: ./my-project
    stable_base: true
  max_iterations: 200
  completion_timeout: 600.0
  language: cn
  enable_task_planning: false
  enable_async_subagent: true
  restrict_to_sandbox: false
  rails: *shared_rails
  tools: *shared_tools
  subagents: *shared_subagents
  project_root: /Users/alan/Developer/alan_workspace/jiuwenclaw

# ---------------------------------------------------------------------------
# Agent specifications
# ---------------------------------------------------------------------------

agents:
  leader:
    <<: *shared_agent_spec
    model:
      <<: *model_template
      model_client_config:
        client_provider: OpenAI
        api_base: "${API_BASE}"
        api_key: "${LEADER_API_KEY}"
        timeout: 120
        rate_limit: 1.0
        verify_ssl: false

  teammate:
    <<: *shared_agent_spec
    model:
      <<: *model_template
      model_client_config:
        client_provider: OpenAI
        api_base: "${API_BASE}"
        api_key: "${TEAMMATE_API_KEY}"
        timeout: 120
        rate_limit: 1.0
        verify_ssl: false


