logging:
  backend: loguru
  defaults:
    level: DEBUG
    enqueue: true
    catch: false
    backtrace: false
    diagnose: false
  sinks:
    console:
      target: ./logs/jiuwen_console.log
      level: DEBUG
      serialize: false
      colorize: true
      enqueue: false
      backtrace: true
      diagnose: false
      format: >-
        <green>{time:YYYY-MM-DD HH:mm:ss.SSS}</green> |
        <magenta>{process.id}</magenta> |
        <level>{level: <8}</level> |
        <cyan>{extra[log_type]}</cyan> |
        <yellow>{extra[trace_id]}</yellow> |
        <white>{extra[member_id]}</white> |
        <blue>{extra[short_path]}:{line}</blue> |
        {message}
    app_json:
      target: ./logs/jiuwen.log
      level: DEBUG
      enqueue: true
      rotation: 500 MB
      retention: 14 days
      compression: gz
      encoding: utf-8
      format: >-
        {time:YYYY-MM-DD HH:mm:ss.SSS} |
        {process.id} |
        {level: <8} |
        {extra[log_type]} |
        {extra[trace_id]} |
        {extra[member_id]} |
        {extra[short_path]}:{line} |
        {message}
    detail_json:
      target: /Users/alan/.openjiuwen/.agent_teams/my_project_team/logs/jiuwen_details.log
      level: DEBUG
      enqueue: true
      rotation: 500 MB
      retention: 14 days
      compression: gz
      encoding: utf-8
  routes:
#    common:
#      - console
#      - app_json
#    interface:
#      - console
#      - app_json
#    prompt_builder:
#      - console
#      - app_json
#    performance:
#      - perf_json
    "*":
      - console
      - app_json
      - detail_json
  loggers:
    common:
      level: INFO
    agent:
      level: INFO
    llm:
      level: INFO
    team:
      level: DEBUG
    sys_operation:
      level: WARN
    runner:
      level: WARN
    session:
      level: INFO
