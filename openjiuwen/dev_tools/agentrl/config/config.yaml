defaults:
  - ppo_trainer
  - _self_

hydra:
  searchpath:
    - pkg://verl.trainer.config

# -- data ------------------------------------------------------------------
data:
  filter_overlong_prompts: false

# -- algorithm -------------------------------------------------------------
algorithm:
  filter_groups: false

# -- model / actor / ref ---------------------------------------------------
actor_rollout_ref:
  model:
    use_remove_padding: true
    enable_gradient_checkpointing: true

  actor:
    ppo_mini_batch_size: 16
    fsdp_config:
      param_offload: true
      optimizer_offload: true

  ref:
    fsdp_config:
      param_offload: true

  rollout:
    mode: async
    name: vllm
    tensor_model_parallel_size: 1
    enforce_eager: true
    gpu_memory_utilization: 0.7
    enable_chunked_prefill: false
    multi_turn:
      format: hermes
    engine_kwargs:
      vllm:
        enable_auto_tool_choice: true
        tool_call_parser: hermes
        served_model_name: agentrl

# -- trainer ---------------------------------------------------------------
trainer:
  device: npu
  runtime_parallel_num: null
  rollout_max_round: null

# -- reward ----------------------------------------------------------------
reward_model:
  reward_manager: naive

# -- JiuwenRL custom -------------------------------------------------------
JiuwenRL:
  whole_trajectory: false
  final_keep_per_prompt: null
  custom_fn:
    classifier: default_classify_rollouts
    validator: default_validate_stop
    sampler: default_sampling
