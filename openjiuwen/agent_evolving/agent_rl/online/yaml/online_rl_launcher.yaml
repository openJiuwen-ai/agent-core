# Runtime defaults for examples/jiuwenrl_online/run_online_rl.py
# CLI flags still work and override these values.

demo: false

inference:
  model_path: /path/to/your/model
  model_name: Qwen3-4B-Thinking-2507
  host: 127.0.0.1
  port: 18002
  gpu_ids: "0,1"
  tp: 2
  existing_url: null
  health_timeout: 300
  env:
    VLLM_ALLOW_RUNTIME_LORA_UPDATING: "1"
  extra_args:
    - --enable-lora
    - --max-loras
    - "4"
    - --max-lora-rank
    - "32"
    - --enable-auto-tool-choice
    - --tool-call-parser
    - hermes
    - --max-model-len
    - "32768"
    - --gpu-memory-utilization
    - "0.85"

judge:
  model_path: ${inference.model_path}
  model_name: ${inference.model_name}
  host: 127.0.0.1
  port: 18003
  gpu_ids: "2,3"
  tp: 2
  existing_url: null
  health_timeout: 600
  reuse_inference_if_same_model: true
  env: {}
  extra_args:
    - --max-model-len
    - "8192"
    - --gpu-memory-utilization
    - "0.85"
    - --max-num-seqs
    - "16"

gateway:
  host: 127.0.0.1
  port: 18080
  redis_url: redis://127.0.0.1:6379/0
  record_dir: records
  log_level: info
  health_timeout: 30
  disable_trajectory_collection: true
  env: {}

trajectory:
  batch_size: 4
  mode: feedback_level

training:
  gpu_ids: "4,5"
  threshold: 4
  scan_interval: 30
  ppo_config: null
  lora_repo: null

jiuwen:
  enabled: true
  agent_server_port: 18092
  app_host: 127.0.0.1
  ws_port: 19000
  web_host: 127.0.0.1
  web_port: 5173
