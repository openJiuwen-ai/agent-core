# Online PPO Trainer — verl PPO config for online RL
#
# Used by OnlineTaskRunner to run PPO train_step on Gateway-collected
# trajectories.  Actor + ref workers only (no critic, no rollout vLLM).
#
# Key differences from offline config:
#   - No rollout workers (data comes pre-built from Gateway)
#   - No critic (Judge score is the reward, REINFORCE advantage)
#   - KL penalty against reference policy to prevent drift
#   - LoRA fine-tuning with FSDP param/optimizer offload

defaults:
  - ppo_trainer
  - _self_

hydra:
  searchpath:
    - pkg://verl.trainer.config

# -- data (dummy, online does not use dataloader) -------------------------
data:
  train_files: /dev/null
  val_files: /dev/null
  train_batch_size: 8
  max_prompt_length: 2048
  max_response_length: 2048
  truncation: truncate
  filter_overlong_prompts: false

# -- algorithm -------------------------------------------------------------
algorithm:
  adv_estimator: reinforce_plus_plus
  gamma: 1.0
  lam: 1.0
  use_kl_in_reward: true
  kl_penalty: kl
  kl_ctrl:
    type: fixed
    kl_coef: 0.001
  filter_groups: false

# -- model / actor / ref ---------------------------------------------------
actor_rollout_ref:
  hybrid_engine: true
  model:
    path: ???
    use_remove_padding: true
    enable_gradient_checkpointing: true
    lora_rank: 16
    lora_alpha: 32
    target_modules: all-linear

  actor:
    strategy: fsdp
    ppo_mini_batch_size: 4
    ppo_micro_batch_size_per_gpu: 2
    ppo_epochs: 1
    use_kl_loss: false
    kl_loss_coef: 0.02
    entropy_coeff: 0.01
    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 0.28
    loss_agg_mode: token-mean
    fsdp_config:
      param_offload: true
      optimizer_offload: true
    optim:
      lr: 1e-5
      lr_scheduler_type: constant

  ref:
    fsdp_config:
      param_offload: true
    log_prob_micro_batch_size_per_gpu: 2

  rollout:
    mode: async
    name: vllm
    tensor_model_parallel_size: 1
    enforce_eager: true
    gpu_memory_utilization: 0.05
    max_model_len: 512
    max_num_seqs: 1
    n: 1
    log_prob_micro_batch_size_per_gpu: 2

# -- trainer ---------------------------------------------------------------
trainer:
  total_epochs: 1
  total_training_steps: null
  nnodes: 1
  n_gpus_per_node: 2
  save_freq: -1
  test_freq: -1
  val_before_train: false
  critic_warmup: 0
  balance_batch: false
  default_local_dir: /tmp/online_ppo_ckpt
  logger: ['console']
  project_name: agent-online-rl
  experiment_name: online-ppo
  device: cuda
  resume_mode: disable

# -- reward (naive = pass-through, scores already in DataProto) -----------
reward_model:
  reward_manager: naive

# -- JiuwenRL custom -------------------------------------------------------
JiuwenRL:
  whole_trajectory: false
  final_keep_per_prompt: null
  custom_fn:
    classifier: default_classify_rollouts
    validator: default_validate_stop
    sampler: default_sampling
