examples: |
  - 案例 1 智能问答工作流
  SOP输入：\n## 任务总览\n- 目标：搭建一个问答工作流，用户提问后由大模型生成回答并输出结果。\n- 输入：用户提问的问题。\n- 输出：大模型生成的回答。\n\n## 整体流程\n1. 用户输入问题。\n2. 系统接收用户输入的问题。\n3. 大模型根据用户输入的问题生成回答。\n4. 系统输出大模型生成的回答。\n\n## 注意事项\n1. 步骤1需要用户输入问题。\n2. 步骤3需要调用大模型生成回答。\n\n用户输入：搭建一个智能客服工作流，用户输入问题后判断用户意图。当用户希望退款时，通过大模型根据公司退款政策，为用户提供退款说明。当用户进行咨询时，通过道行根据用户的问题提供相关产品咨询建议。两者都不是的时候输出‘抱歉，我暂时无法理解您的请求，请尝试使用更明确的描述。’\nSOP结果：\n## 任务总览\n- 目标：搭建一个智能客服工作流，根据用户输入的问题判断用户意图并提供相应的服务。\n- 输入：用户输入的问题文本。\n- 输出：根据用户意图提供退款说明、产品咨询建议或无法理解的提示。
  生成结果：
  ```json[{"id": "node_start", "type": "Start", "description": "问答开始", "parameters": {"outputs": [{"name": "query", "description": "用户输入"}]}, "next": "node_ask_question"}, {"id": "node_ask_question", "type": "Questioner", "description": "获取用户问题", "parameters": {"inputs": [], "outputs": [{"name": "question", "description": "问题"}], "configs": {"prompt": "请描述你想了解的问题。"}}, "next": "node_llm_answer"}, {"id": "node_llm_answer", "type": "LLM", "description": "大模型回答", "parameters": {"inputs": [{"name": "input", "value": "${node_ask_question.question}"}], "outputs": [{"name": "output", "description": "大模型输出"}], "configs": {"system_prompt": "你是一个知识助手，请回答用户的问题", "user_prompt": "问题：{{input}}"}}, "next": "node_show_result"}, {"id": "node_show_result", "type": "Output", "description": "输出结果", "parameters": {"inputs": [{"name": "content", "value": "${node_llm_answer.output}"}], "configs": {"template": "这是我找到的答案：{{content}}"}}, "next": "node_end"}, {"id": "node_end", "type": "End", "description": "问答结束", "parameters": {"inputs": [], "configs": {"template": ""}}}]```
  - 案例 2 智能客服流程
  SOP输入：## 任务总览\n- 目标：搭建一个智能客服工作流，根据用户输入的问题判断用户意图并提供相应的服务。\n- 输入：用户输入的问题文本。\n- 输出：根据用户意图提供退款说明、产品咨询建议或无法理解的提示。\n\n## 整体流程\n1. 接收用户输入的问题文本。\n2. 判断用户意图：\n   - 如果用户希望退款，则通过大模型根据公司退款政策生成退款说明。\n   - 如果用户进行咨询，则通过道行根据用户的问题提供相关产品咨询建议。\n   - 如果两者都不是，则输出‘抱歉，我暂时无法理解您的请求，请尝试使用更明确的描述。’\n\n## 注意事项\n1. 需要用户输入问题文本。\n2. 需要调用大模型生成退款说明。\n3. 需要调用道行提供产品咨询建议。
  生成结果：
  ```json[{"id": "node_start", "type": "Start", "description": "开始", "parameters": {"outputs": [{"name": "query", "description": "用户输入"}]}, "next": "node_intent_detection"}, {"id": "node_intent_detection", "type": "IntentDetection", "description": "客户意图识别", "parameters": {"inputs": [{"name": "input", "value": "${node_start.query}"}], "configs": {"prompt": "你是一个功能分类器，可以根据用户的请求，结合相应的功能类别描述，帮助用户选择正确的分支"}, "conditions": [{"branch": "branch_1", "description": "退款", "expression": "${node_intent_detection.rawOutput} contain 退款", "next": "node_refund_handler"}, {"branch": "branch_2", "description": "咨询", "expression": "${node_intent_detection.rawOutput} contain 咨询", "next": "node_consult_handler"}, {"branch": "branch_0", "description": "默认分支", "expression": "default", "next": "node_unknown_handler"}]}}, {"id": "node_refund_handler", "type": "LLM", "description": "退款处理", "parameters": {"inputs": [{"name": "input", "value": "${node_start.query}"}], "outputs": [{"name": "output", "description": "退款说明"}], "configs": {"system_prompt": "请根据公司退款政策，为用户提供退款说明。", "user_prompt": "用户诉求：{{input}}"}}, "next": "node_end"}, {"id": "node_consult_handler", "type": "LLM", "description": "咨询处理", "parameters": {"inputs": [{"name": "input", "value": "${node_start.query}"}], "outputs": [{"name": "output", "description": "咨询回复"}], "configs": {"system_prompt": "请根据用户的问题提供相关产品咨询建议。", "user_prompt": "问题：{{input}}"}}, "next": "node_end"}, {"id": "node_unknown_handler", "type": "Output", "description": "提示不确定意图", "parameters": {"inputs": [], "configs": {"template": "抱歉，我暂时无法理解您的请求，请尝试使用更明确的描述。"}}, "next": "node_end"}, {"id": "node_end", "type": "End", "description": "结束", "parameters": {"inputs": [], "configs": {"template": ""}}}]```
  - 案例 3 天气助手工作流
  SOP输入：## 任务总览\n- 目标：根据用户输入的城市名查询天气，并根据温度范围生成自然语言回答。\n- 输入：城市名（字符串类型，1个）。\n- 输出：根据温度范围生成的自然语言回答。\n\n## 整体流程\n1. 用户输入城市名。\n2. 系统根据城市名查询天气信息，获取当前温度。\n3. 根据温度范围判断：\n   - 如果温度低于10度，调用大模型生成提醒用户注意保暖的回答。\n   - 如果温度高于30度，调用大模型生成提醒用户注意防暑降温的回答。\n   - 如果温度处于10-30度之间，调用大模型生成提醒用户温度适宜，推荐外出运动或游玩的回答。\n4. 输出生成的自然语言回答。\n\n## 注意事项\n1. 需要用户输入城市名。\n2. 需要调用外部天气查询接口获取温度信息。\n3. 需要调用大模型生成自然语言回答。\n4. 业务规则：\n   - 温度低于10度时，提醒用户注意保暖。\n   - 温度高于30度时，提醒用户注意防暑降温。\n   - 温度处于10-30度时，提醒用户温度适宜，推荐外出运动或游玩。
  生成结果：
  ```json[{"id": "node_start", "type": "Start", "description": "问答", "parameters": {"outputs": [{"name": "query", "description": "用户输入"}]}, "next": "node_ask_city"}, {"id": "node_ask_city", "type": "Questioner", "description": "提问获取城市名称", "parameters": {"inputs": [], "outputs": [{"name": "city", "description": "城市"}], "configs": {"prompt": "请输入你想查询天气的城市名。"}}, "next": "node_plugin_weather"}, {"id": "node_plugin_weather", "type": "Plugin", "description": "天气查询插件", "parameters": {"inputs": [{"name": "city", "value": "${node_ask_city.city}"}], "outputs": [{"name": "weather", "description": "天气信息"}], "configs": {"tool_id": "mock_weather_id", "tool_name": "get_weather_by_city"}}, "next": "node_code"}, {"id": "node_code_format", "type": "Code", "description": "格式化天气信息", "parameters": {"inputs": [{"name": "weather", "value": "${node_plugin_weather.weather}"}], "outputs": [{"name": "temperature", "description": "温度"}, {"name": "description", "description": "天气描述"}], "configs": {"code": "def main(args: dict):\n    params = args.get('params')\n    weather = params.get('weather')\n    temper = weather['temperature']\n    desc = weather['description']\n    return {\n        'temperature': temper,\n        'description': desc\n    }"}}, "next": "node_check_temperature"}, {"id": "node_check_temperature", "type": "Branch", "description": "温度判断", "parameters": {"conditions": [{"branch": "branch_1", "description": "当温度小于10度时", "expression": "${node_code_format.temperature} short_than 10", "next": "node_llm_cold"}, {"branch": "branch_2", "description": "当温度大于30度时", "expression": "${node_code_format.temperature} longer_than 30", "next": "node_llm_hot"}, {"branch": "branch_3", "description": "当温度大于等于10且小于等于30度时", "expressions": ["${node_code_format.temperature} longer_than_or_eq 10", "${node_code_format.temperature} short_than_or_eq 30"], "operator": "and", "next": "node_llm_mild"}, {"branch": "branch_0", "description": "默认分支", "expression": "default", "next": "node_end"}]}}, {"id": "node_llm_cold", "type": "LLM", "description": "调用大模型生成回复", "parameters": {"inputs": [{"name": "temperature", "value": "${node_code_format.temperature}"}, {"name": "description", "value": "${node_code_format.description}"}], "outputs": [{"name": "output", "description": "天气信息回复"}], "configs": {"system_prompt": "根据以下天气信息生成关怀提示，建议用户注意保暖：\n温度：{{temperature}}，天气状况：{{description}}", "user_prompt": ""}}, "next": "node_end"}, {"id": "node_llm_hot", "type": "LLM", "description": "调用大模型生成回复", "parameters": {"inputs": [{"name": "temperature", "value": "${node_code_format.temperature}"}, {"name": "description", "value": "${node_code_format.description}"}], "outputs": [{"name": "output", "description": "天气信息回复"}], "configs": {"system_prompt": "根据以下天气信息生成关怀提示，提醒用户注意防暑降温：\n温度：{{temperature}}，天气状况：{{description}}", "user_prompt": ""}}, "next": "node_end"}, {"id": "node_llm_mild", "type": "LLM", "description": "调用大模型生成回复", "parameters": {"inputs": [{"name": "temperature", "value": "${node_code_format.temperature}"}, {"name": "description", "value": "${node_code_format.description}"}], "outputs": [{"name": "output", "description": "天气信息回复"}], "configs": {"system_prompt": "根据以下天气信息生成关怀提示，建议用户外出活动：\n温度：{{temperature}}，天气状况：{{description}}", "user_prompt": ""}}, "next": "node_end"}, {"id": "node_end", "type": "End", "description": "工作流结束", "parameters": {"inputs": [], "configs": {"template": ""}}}]```
